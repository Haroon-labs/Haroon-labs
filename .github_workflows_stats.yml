name: Update GitHub Stats

on:
  schedule:
    # Run every day at midnight UTC
    - cron: "0 0 * * *"

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch GitHub stats & generate SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py path/to/your/photo.jpg

      - name: Commit & push updated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if profile.svg changed
          if [ -n "$(git status profile.svg --porcelain)" ]; then
            git add profile.svg stats.json .stats_cache.json
            git commit -m "chore: update GitHub stats (auto)"
            git push
          else
            echo "No changes to profile.svg"
          fi
