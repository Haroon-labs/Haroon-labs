name: Update GitHub Stats

on:
  push:
    branches:
      - main

  schedule:
    # Run every day at midnight UTC
    - cron: "0 0 * * *"

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch GitHub stats & generate README
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          BIRTH_DATE: ${{ vars.BIRTH_DATE }}
          INFO_OS: ${{ vars.INFO_OS }}
          INFO_HOST: ${{ vars.INFO_HOST }}
          INFO_KERNEL: ${{ vars.INFO_KERNEL }}
          INFO_IDE: ${{ vars.INFO_IDE }}
          INFO_LANGUAGES_PROGRAMMING: ${{ vars.INFO_LANGUAGES_PROGRAMMING }}
          INFO_LANGUAGES_REAL: ${{ vars.INFO_LANGUAGES_REAL }}
          INFO_HOBBIES_TECHNICAL: ${{ vars.INFO_HOBBIES_TECHNICAL }}
          INFO_HOBBIES_SPORTS: ${{ vars.INFO_HOBBIES_SPORTS }}
        run: python main.py profile.png

      - name: Commit & push updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if README or the stats SVG changed
          if [ -n "$(git status README.md stats.svg --porcelain)" ]; then
            git add README.md stats.svg
            git commit -m "chore: update GitHub stats (auto)" -m "Automated daily stats update from GitHub Actions"
            git push
          else
            echo "No changes to README"
          fi
